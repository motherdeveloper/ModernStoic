<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOIC AF: The Philosophy of People Who Win</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap">
  <style>
    :root {
      --black: #000;
      --gold: #fab005;
      --neon-red: #ff3864;
      --white: #fff;
      --dark-gradient: linear-gradient(135deg, #1a1a1a, #000000);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--dark-gradient);
      color: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }
    header {
      text-align: center;
      padding: 50px 20px;
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      color: var(--gold);
    }
    header p {
      font-size: 1.5rem;
      margin: 15px 0;
    }
    .hero-buttons {
      margin-top: 20px;
    }
    .hero-buttons a {
      text-decoration: none;
      display: inline-block;
      padding: 15px 30px;
      margin: 10px;
      border-radius: 5px;
      font-size: 1.2rem;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    .hero-buttons a.challenge {
      background: var(--neon-red);
      color: var(--white);
    }
    .hero-buttons a.legion {
      background: var(--gold);
      color: var(--black);
    }
    .hero-buttons a:hover {
      opacity: 0.8;
    }
    .social-proof {
      text-align: center;
      padding: 20px;
      background: #111;
      margin-top: 30px;
    }
    .social-proof h3 {
      font-size: 1.5rem;
      color: var(--gold);
    }
    .social-proof .logos {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    footer {
      text-align: center;
      padding: 10px 0;
      background: #222;
      margin-top: 30px;
    }
    footer p {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>STOIC AF</h1>
    <p>The Philosophy of People Who Win</p>
    <div class="hero-buttons">
      <a href="#challenge" class="challenge">Take the 30-Day Challenge</a>
      <a href="#community" class="legion">Join the Legion</a>
    </div>
  </header>
  
  <section class="social-proof">
    <h3>50,000+ Rebels Training Their Minds</h3>
    <div class="logos">
      <img src="logo-placeholder.png" alt="Partner Logo" width="80">
      <img src="logo-placeholder.png" alt="Media Logo" width="80">
      <img src="logo-placeholder.png" alt="Influencer Logo" width="80">
    </div>
    <small>*Featured in Top Gyms & Podcasts*</small>
  </section>

  <footer>
    <p>© 2026 STOIC AF. All Rights Reserved. | <a href="#" style="color: var(--gold);">Privacy</a> | <a href="#" style="color: var(--gold);">Terms</a></p>
  </footer>
</body>
</html>
